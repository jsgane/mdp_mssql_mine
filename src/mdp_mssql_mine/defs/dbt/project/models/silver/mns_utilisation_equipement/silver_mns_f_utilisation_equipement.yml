version: 2

models:
  - name: silver_mns_f_utilisation_equipement
    description: |
      mns_utilisation_equipement from mssql.

      This silver layer model provides a clean, business-friendly view of all mns_utilisation_equipement. 
      Sourced from mssql.

    config:
      tags: ["silver", "mns_utilisation_equipement"]
    
    columns:
      - name: teq_sk
        description: "Surrogate key of the equipment utilization record."

      - name: uteq_code
        description: "Unique business code identifying the equipment utilization entry."

      - name: NeembaEquipmentID
        description: "Unique equipment identifier used internally by Neemba."

      - name: uteq_equ_sk
        description: "Surrogate key referencing the related equipment."

      - name: uteq_mes_code
        description: "Business code representing the reporting measure."

      - name: uteq_mes_sk
        description: "Surrogate key of the reporting measure."

      - name: uteq_msi_code
        description: "Business code of the associated site."

      - name: uteq_msi_sk
        description: "Surrogate key referencing the associated site."

      - name: OpeHours
        description: "Total operating hours recorded for the equipment during the reporting month."

      - name: uteq_rfm_ak
        description: "Alternate key used."
              
      - name: dbt_processed_at
        description: "Timestamp when dbt processed this data"
        tests:
          - not_null

      - name: dbt_model_name
        description: "Name of the dbt model that created this record"

      - name: layer_prefix
        description: "Data layer prefix (silver)"

      - name: business_domain
        description: "Business domain classification"