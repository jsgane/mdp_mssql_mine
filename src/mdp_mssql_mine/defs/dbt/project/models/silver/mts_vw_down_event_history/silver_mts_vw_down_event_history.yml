version: 2

models:
  - name: silver_mts_vw_down_event_history
    description: |
      mts_vw_down_event_history from mssql.

      This silver layer model provides a clean, business-friendly view of all mts_vw_down_event_history. 
      Sourced from mssql.

    config:
      tags: ["silver", "mts_vw_down_event_history"]
    
    columns:
      - name: mea_sk
        description: "Surrogate key of the equipment downtime event."
    
      - name: mea_code
        description: "Business identifier of the equipment downtime event."
    
      - name: SiteID
        description: "Surrogate key identifying the site where the downtime occurred."
    
      - name: Site
        description: "Business code of the site where the downtime occurred."
    
      - name: NeembaEquipmentID
        description: "Surrogate key identifying the equipment in the Neemba system."
    
      - name: SerialNumber
        description: "Serial number of the equipment."
    
      - name: DownCategory
        description: "Downtime category derived from planning flag (Planned, Unplanned, or Undefined)."
    
      - name: DownType
        description: "Type of downtime event as defined in the downtime event dimension."
    
      - name: DownComments
        description: "Free-text comments describing the downtime event."
    
      - name: Starttime
        description: "Timestamp when the downtime event started."
    
      - name: Endtime
        description: "Timestamp when the downtime event ended."
    
      - name: DurationSecs
        description: "Total duration of the downtime event in seconds."
    
      - name: isMissingStartTimeFlag
        description: "Flag indicating that the downtime start time is missing (1 = missing, 0 = present)."
    
      - name: isActiveFlag
        description: "Flag indicating that the downtime event is still active (1 = no end time, 0 = closed)."
    
      - name: YearMonth
        description: "Year and month of the downtime event in YYYYMM format."
              
      - name: dbt_processed_at
        description: "Timestamp when dbt processed this data"
        tests:
          - not_null

      - name: dbt_model_name
        description: "Name of the dbt model that created this record"

      - name: layer_prefix
        description: "Data layer prefix (silver)"

      - name: business_domain
        description: "Business domain classification"