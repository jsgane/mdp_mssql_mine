name: 'mdp_mssql_mine'
version: '1.0.0'
config-version: 2

profile: 'mdp_mssql_mine'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  mdp_mssql_mine:
    silver:
      +materialized: view
      +tags: ["silver", "transformation"]
      
      
      mns_site:
        silver_mns_site:
          +alias: "Dim_Sites"
        +tags: ["silver", "mns_site"]
        +docs:
          node_color: "#4CAF50"
      
      ref_vw_nba_machines:
        silver_ref_vw_nba_machines:
          +alias: "Dim_Machine"
        +tags: ["silver", "ref_vw_nba_machines"]
        +docs:
          node_color: "#4CAF50"
      
      mns_utilisation_equipement:
        silver_mns_utilisation_equipement:
          +alias: "Fact_Op_Hours"
        +tags: ["silver", "mns_utilisation_equipement"]
        +docs:
          node_color: "#4CAF50"
      
      
      
    #gold:
    #  +materialized: table
    #  +tags: ["gold", "analytics"]
    #  work_order:
    #    gold_quote_work_order:
    #      +alias: "C_GOLD_QUOTE_WORK_ORDER"
    #    +tags: ["gold", "work_order"]
    #    +docs:
    #      node_color: "#FFD700"
      


tests:
  mdp_mssql_mine:
    +severity: warn
    +store_failures: true

vars:
  bronze_prefix: 'a_bronze_'
  silver_prefix: 'b_silver_'
  gold_prefix: 'c_gold_'
  schema_name: 'services'
  lookback_days: 90
  environment: 'production'

dispatch:
  - macro_namespace: dbt
    search_order: ['mdp_mssql_mine', 'dbt']

on-run-start:
  - "{{ log('========================================', info=true) }}"
  - "{{ log('Starting dbt run for MDP Mines', info=true) }}"
  - "{{ log('Environment: ' ~ var('environment'), info=true) }}"
  - "{{ log('Schema: ' ~ var('schema_name'), info=true) }}"
  - "{{ log('========================================', info=true) }}"

on-run-end:
  - "{{ log('========================================', info=true) }}"
  - "{{ log('Completed dbt run for MDP Mines', info=true) }}"
  - "{{ log('========================================', info=true) }}"
